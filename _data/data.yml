career-profile:
    title: Career Profile
    summary: |
      I am a knowledgeable cyber security analyst with over 13 years experience looking to expand my career. 
      As the head of the global security operations center I would implement a SOC maturity program, establish clear service level agreements between the SOC and business unit security offices, and I would drive to deliver improvements across all aspects of SOC services.
